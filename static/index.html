<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Wellness Agent</title>
    <meta name="description" content="AI-powered health and wellness planning assistant for diet, exercise, and progress tracking.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <!-- Chat Header -->
        <div class="chat-header" id="chatHeader">
            <div class="header-left">
                <div class="bot-avatar-header">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a4 4 0 0 1 4 4v1H8V6a4 4 0 0 1 4-4z"/>
                        <rect x="3" y="7" width="18" height="13" rx="3"/>
                        <circle cx="9" cy="13" r="1.5"/>
                        <circle cx="15" cy="13" r="1.5"/>
                        <path d="M9 17h6"/>
                    </svg>
                </div>
                <div class="header-info">
                    <h1 id="headerTitle">HealthBot</h1>
                    <div class="status-row">
                        <span class="status-dot"></span>
                        <span class="status-text">Online now</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="resetBtn" title="New Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
                <button class="header-btn" id="minimizeBtn" title="Minimize">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message will be injected via JS -->
        </div>

        <!-- Quick Replies Area -->
        <div class="quick-replies" id="quickReplies">
            <!-- Quick reply buttons will be injected via JS -->
        </div>

        <!-- Chat Input -->
        <div class="chat-input-area" id="chatInputArea">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="Reply to HealthBot..." 
                    autocomplete="off"
                    autofocus
                >
                <button class="send-btn" id="sendBtn" title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="powered-by">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
                <span>Powered by <strong>HealthBot AI</strong></span>
            </div>
        </div>
    </div>

    <!-- Minimized Chat Bubble -->
    <button class="chat-bubble" id="chatBubble" style="display:none;" title="Open Chat">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <script src="/static/script.js"></script>
</body>
</html>
